<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dark Pixel Dungeon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="menu-screen" class="screen">
    <div class="menu-box">
      <h1>⚔️ Dark Pixel Dungeon ⚔️</h1>
      <p class="subtitle">Пиксельный рогалик</p>
      <div id="menu-buttons"></div>
    </div>
  </div>

  <div id="game-screen" class="screen" style="display:none;">
    <div id="ui-top">
      <div class="panel stats">
        <span class="icon-heart">❤️</span> <span id="hp">20</span>/<span id="maxhp">20</span>
        <span class="icon-sword">⚔️</span> <span id="atk">4</span>
        <span class="icon-shield">🛡️</span> <span id="def">1</span>
      </div>
      <div class="panel floor-info">🏔️ Этаж <span id="floor">1</span></div>
      <div class="panel inventory">🎒 <span id="inv-list">пусто</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-thumb"></div>
        </div>
      </div>
      <button id="action-btn" class="action-button">⚡</button>
    </div>

    <div id="log"></div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="game.js"></script>
</body>
</html>
