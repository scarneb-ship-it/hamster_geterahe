<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>LAST VOTE</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <!-- Главный экран -->
        <div id="main-screen" class="screen active">
            <div class="user-bar">
                <img id="user-avatar" src="" alt="Аватар" class="avatar" />
                <div>
                    <h2 id="user-name"></h2>
                    <div class="level">Уровень <span id="user-level">1</span></div>
                </div>
            </div>
            <div class="timer-box">
                <div class="timer-label">До следующего голосования</div>
                <div id="vote-timer" class="timer-value">--:--:--</div>
            </div>
            <button id="vote-btn" class="btn-primary">ГОЛОСОВАТЬ</button>
            <div class="nav-grid">
                <button class="nav-btn" data-screen="leaderboard">🏆 Таблица</button>
                <button class="nav-btn" data-screen="rewards">🎁 Награды</button>
                <button class="nav-btn" id="invite-btn">📨 Пригласить</button>
            </div>
        </div>

        <!-- Экран голосования -->
        <div id="vote-screen" class="screen">
            <h2>Кого удалить сегодня?</h2>
            <div id="candidates-list"></div>
            <button id="back-from-vote" class="btn-back">← Назад</button>
        </div>

        <!-- Лидерборд -->
        <div id="leaderboard-screen" class="screen">
            <h2>🏆 Лидеры</h2>
            <ol id="leaders-list"></ol>
            <button class="btn-back" data-screen="main">← Назад</button>
        </div>

        <!-- Награды -->
        <div id="rewards-screen" class="screen">
            <h2>🎁 Ежедневные награды</h2>
            <div class="reward-card">
                <span>День входа: <strong id="streak-days">1</strong></span>
                <span>Бонус: <strong id="streak-bonus">+10</strong> очков</span>
                <button id="claim-reward-btn" class="btn-primary">Забрать</button>
                <p class="note" id="reward-status"></p>
            </div>
            <div class="ref-info">
                <h3>Рефералы</h3>
                <p>Приглашено: <span id="ref-count">0</span></p>
                <p>За каждого друга: +2 очка и щит на день</p>
            </div>
            <button class="btn-back" data-screen="main">← Назад</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
