<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Хомяк AI – Крипто Империя</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="phone-frame">
        <!-- Шапка -->
        <header class="top-bar">
            <div class="resource"><span class="icon">🪙</span> <span id="coins">0</span></div>
            <div class="resource"><span class="icon">💎</span> <span id="crystals">0</span></div>
            <div class="resource"><span class="icon">⚡</span> <span id="energy">100/100</span></div>
            <div class="resource level">Ур. <span id="level">1</span></div>
        </header>

        <!-- Основной контент (переключаемые экраны) -->
        <main class="content">
            <!-- Экран 1: Главный -->
            <section id="screen-main" class="screen active">
                <div class="main-hamster" id="hamster-tap">
                    <span>🐹</span>
                    <div class="tap-effect" id="tap-effect">+1</div>
                </div>
                <div class="income-bar">💰 Доход: <span id="income-hour">0</span>/час</div>
                <div class="xp-bar"><progress id="xp-progress" value="0" max="100"></progress> Опыт: <span id="xp-text">0/100</span></div>
                <button class="btn" id="btn-collect">Собрать доход</button>
                <div class="boost-buttons">
                    <button class="btn small" id="boost-energy">⚡Энергия x2 (30м)</button>
                    <button class="btn small" id="boost-income">💰Доход x2 (1ч)</button>
                </div>
                <button class="btn small" id="btn-daily-reward">🎁 Ежедневная награда</button>
                <button class="btn small" id="btn-cases">📦 Кейсы</button>
            </section>

            <!-- Экран 2: База -->
            <section id="screen-base" class="screen">
                <h3>🏗️ Моя база</h3>
                <div id="buildings-container"></div>
            </section>

            <!-- Экран 3: Задания -->
            <section id="screen-tasks" class="screen">
                <h3>📋 Задания</h3>
                <div id="tasks-container"></div>
            </section>

            <!-- Экран 4: AI-помощник -->
            <section id="screen-ai" class="screen">
                <h3>🤖 AI-наставник</h3>
                <div id="chat-window"></div>
                <div class="chat-input">
                    <input type="text" id="ai-input" placeholder="Спроси о крипте...">
                    <button id="ai-send">➤</button>
                </div>
            </section>

            <!-- Экран 5: Рейтинг -->
            <section id="screen-leader" class="screen">
                <h3>🏆 Рейтинг игроков</h3>
                <ol id="leaders-list"></ol>
                <p>👥 Приглашено друзей: <span id="ref-count">0</span></p>
                <button class="btn" id="btn-invite">📤 Пригласить друга</button>
                <p id="ref-bonus"></p>
            </section>
        </main>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-screen="main">🏠</button>
            <button class="nav-btn" data-screen="base">🏗️</button>
            <button class="nav-btn" data-screen="tasks">📋</button>
            <button class="nav-btn" data-screen="ai">🤖</button>
            <button class="nav-btn" data-screen="leader">🏆</button>
        </nav>
    </div>

    <!-- Модальные окна -->
    <div id="modal-daily" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>🎁 Ежедневные награды</h3>
            <div id="daily-rewards"></div>
        </div>
    </div>
    <div id="modal-cases" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>📦 Кейсы</h3>
            <p>Обычный кейс: <button id="open-common-case">Открыть</button></p>
            <p>Редкий кейс: <button id="open-rare-case">Открыть (💎5)</button></p>
            <p id="case-result"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
