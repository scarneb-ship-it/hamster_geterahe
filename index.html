<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neural Dungeon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      font-family: monospace;
      color: #eee;
    }
    canvas {
      border: 1px solid #333;
      image-rendering: pixelated;
    }
    #ui-container {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    .panel {
      background: rgba(0,0,0,0.8);
      border: 1px solid #555;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1.4;
    }
    #log {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd700;
      font-size: 16px;
      text-shadow: 1px 1px 2px black;
      background: rgba(0,0,0,0.7);
      padding: 6px 18px;
      border-radius: 12px;
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0;
    }
    button {
      background: #4a4a8a;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 4px;
      font-family: monospace;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      pointer-events: auto;
    }
    button:hover {
      background: #6a6aaa;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      border: 2px solid #555;
      padding: 30px;
      text-align: center;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Главное меню (заменяется на игру при старте) -->
  <div id="menu">
    <h2>Neural Dungeon</h2>
    <p>AI Roguelike</p>
    <div id="menu-buttons"></div>
  </div>

  <!-- UI поверх canvas -->
  <div id="ui-container">
    <div class="panel" id="stats-panel">
      HP: <span id="hp">20</span>/<span id="maxhp">20</span><br>
      ATK: <span id="atk">4</span> DEF: <span id="def">1</span><br>
      Floor: <span id="floor">1</span>
    </div>
    <div class="panel" id="inventory-panel">
      🎒 Инвентарь: <span id="inv-list">пусто</span>
    </div>
  </div>

  <div id="log"></div>

  <canvas id="gameCanvas"></canvas>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    // ================= ГЛОБАЛЬНЫЕ НАСТРОЙКИ =================
    const TILE_SIZE = 32;                // размер одной клетки в пикселях
    const MAP_COLS = 21;                // ширина карты в клетках (нечётное для удобства)
    const MAP_ROWS = 15;                // высота карты
    const COLORS = {
      FLOOR: '#2a2a1a',
      WALL: '#443322',
      CORRIDOR: '#1a1a1a',
      PLAYER: '#00ccff',
      ENEMY: '#cc3333',
      ITEM: '#ffcc00',
      EXIT: '#00ffaa',
      HPbar: '#ff4466',
      TEXT: '#ffffff'
    };

    // ================= ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP =================
    const isTelegram = (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp);
    const tg = isTelegram ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
      // Отключаем вертикальные свайпы для мини-аппов
      tg.disableVerticalSwipes();
    }

    // ================= ХРАНИЛИЩЕ (Telegram Cloud / localStorage) =================
    const storage = {
      async get(key) {
        if (tg && tg.CloudStorage) {
          try {
            const result = await new Promise((resolve, reject) => {
              tg.CloudStorage.getItem(key, (err, value) => {
                if (err) reject(err);
                else resolve(value);
              });
            });
            return result;
          } catch (e) {
            console.warn('CloudStorage get failed, fallback to localStorage');
          }
        }
        return localStorage.getItem(key);
      },
      async set(key, value) {
        if (tg && tg.CloudStorage) {
          try {
            await new Promise((resolve, reject) => {
              tg.CloudStorage.setItem(key, value, (err, result) => {
                if (err) reject(err);
                else resolve(result);
              });
            });
            return;
          } catch (e) {
            console.warn('CloudStorage set failed, fallback to localStorage');
          }
        }
        localStorage.setItem(key, value);
      },
      async remove(key) {
        if (tg && tg.CloudStorage) {
          try {
            await new Promise((resolve, reject) => {
              tg.CloudStorage.removeItem(key, (err, result) => {
                if (err) reject(err);
                else resolve(result);
              });
            });
            return;
          } catch (e) {
            console.warn('CloudStorage remove failed, fallback to localStorage');
          }
        }
        localStorage.removeItem(key);
      }
    };

    // ================= ЗВУКИ (Web Audio) =================
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playTone(freq, duration, type = 'square', vol = 0.08) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    function sfxStep() { playTone(120, 0.05, 'square', 0.05); }
    function sfxHit() { playTone(80, 0.1, 'sawtooth', 0.1); }
    function sfxPickup() { playTone(500, 0.08, 'sine', 0.08); playTone(700, 0.08, 'sine', 0.08); }
    function sfxLevelUp() { playTone(400, 0.1, 'square'); playTone(600, 0.1, 'square'); playTone(800, 0.15, 'square'); }

    // ================= ГЕНЕРАЦИЯ SPRITE SHEET (пиксель-арт) =================
    function generateSpriteSheet() {
      const size = 16; // каждый спрайт 16x16
      const count = 6; // 6 спрайтов: игрок, враг1, враг2, зелье, меч, выход
      const canvas = document.createElement('canvas');
      canvas.width = size * count;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Цвета
      const p = (x, y, r, g, b) => { ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fillRect(x, y, 1, 1); };
      // Рисуем пикселями (очень упрощённо, но узнаваемо)
      function drawSprite(index, drawFunc) {
        ctx.save();
        ctx.translate(index * size, 0);
        drawFunc(ctx);
        ctx.restore();
      }
      // Игрок (синий рыцарь)
      drawSprite(0, ctx => {
        ctx.fillStyle = '#3388ff';
        ctx.fillRect(6, 3, 4, 4);  // голова
        ctx.fillStyle = '#2266cc';
        ctx.fillRect(5, 7, 6, 5);  // тело
        ctx.fillStyle = '#1155aa';
        ctx.fillRect(4, 12, 3, 3); // левая нога
        ctx.fillRect(9, 12, 3, 3); // правая нога
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(8, 4, 1, 2);   // глаз
      });
      // Враг 1 (красный слайм)
      drawSprite(1, ctx => {
        ctx.fillStyle = '#dd3344';
        ctx.fillRect(4, 7, 8, 6);
        ctx.fillRect(6, 5, 4, 2);
        ctx.fillStyle = '#ff8899';
        ctx.fillRect(7, 6, 2, 1);
      });
      // Враг 2 (скелет)
      drawSprite(2, ctx => {
        ctx.fillStyle = '#cccccc';
        ctx.fillRect(6, 3, 4, 4);
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(5, 7, 6, 4);
        ctx.fillRect(4, 11, 2, 4);
        ctx.fillRect(10, 11, 2, 4);
        ctx.fillStyle = '#000000';
        ctx.fillRect(7, 4, 1, 1);
        ctx.fillRect(8, 4, 1, 1);
      });
      // Зелье (красное)
      drawSprite(3, ctx => {
        ctx.fillStyle = '#ff3355';
        ctx.fillRect(7, 5, 2, 5);
        ctx.fillStyle = '#aa2244';
        ctx.fillRect(6, 10, 4, 4);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(8, 6, 1, 1);
      });
      // Меч (улучшение атаки)
      drawSprite(4, ctx => {
        ctx.fillStyle = '#cccccc';
        ctx.fillRect(8, 3, 2, 9);
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(6, 10, 6, 2);
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(7, 12, 4, 1);
      });
      // Выход (зелёный портал)
      drawSprite(5, ctx => {
        ctx.fillStyle = '#22ff88';
        ctx.fillRect(6, 6, 4, 4);
        ctx.fillStyle = '#11cc66';
        ctx.fillRect(7, 7, 2, 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(8, 8, 1, 1);
      });

      return canvas.toDataURL();
    }

    const SPRITE_SHEET = generateSpriteSheet();
    // Индексы спрайтов
    const SPRITE = { PLAYER: 0, ENEMY_SLIME: 1, ENEMY_SKELETON: 2, POTION: 3, SWORD: 4, EXIT: 5 };

    // ================= МОДЕЛЬ ДАННЫХ =================
    class GameState {
      constructor() {
        this.floor = 1;
        this.player = { hp: 20, maxHp: 20, atk: 4, def: 1, items: [] };
        this.dungeon = null; // объект карты
        this.gameOver = false;
      }
      toJSON() {
        return { floor: this.floor, player: this.player, dungeon: this.dungeon?.toJSON() };
      }
      static fromJSON(data) {
        const gs = new GameState();
        gs.floor = data.floor;
        gs.player = data.player;
        if (data.dungeon) {
          gs.dungeon = Dungeon.fromJSON(data.dungeon);
        }
        return gs;
      }
    }

    class Dungeon {
      constructor(map, rooms, playerPos, exitPos, enemies, items) {
        this.map = map;          // 2D массив: 0=стена, 1=пол
        this.rooms = rooms;      // [{x,y,w,h}]
        this.playerPos = playerPos;
        this.exitPos = exitPos;
        this.enemies = enemies || []; // [{x,y,type,hp,maxHp,atk,def}]
        this.items = items || [];     // [{x,y,type}] type: 'potion','sword'
      }
      toJSON() {
        return {
          map: this.map,
          rooms: this.rooms,
          playerPos: this.playerPos,
          exitPos: this.exitPos,
          enemies: this.enemies,
          items: this.items
        };
      }
      static fromJSON(data) {
        return new Dungeon(data.map, data.rooms, data.playerPos, data.exitPos, data.enemies, data.items);
      }
    }

    // ================= ГЕНЕРАТОР ПОДЗЕМЕЛИЙ (BSP + коридоры) =================
    function generateDungeon(floorNumber) {
      const width = MAP_COLS;
      const height = MAP_ROWS;
      const map = Array(height).fill().map(() => Array(width).fill(0)); // 0 стена

      // Параметры сложности
      const numRooms = 5 + Math.floor(floorNumber / 2);
      const minRoomSize = 3;
      const maxRoomSize = 6;
      const enemyCount = 2 + Math.floor(floorNumber * 1.2);
      const itemCount = 2 + Math.floor(floornumber / 2);

      // Генерируем комнаты
      const rooms = [];
      for (let i = 0; i < numRooms * 3; i++) { // попытки
        const w = randInt(minRoomSize, maxRoomSize);
        const h = randInt(minRoomSize, maxRoomSize);
        const x = randInt(1, width - w - 2);
        const y = randInt(1, height - h - 2);
        const newRoom = { x, y, w, h };
        if (!rooms.some(r => intersect(r, newRoom))) {
          rooms.push(newRoom);
          // вырезаем комнату
          for (let row = y; row < y + h; row++) {
            for (let col = x; col < x + w; col++) {
              map[row][col] = 1;
            }
          }
        }
        if (rooms.length >= numRooms) break;
      }

      // Соединяем комнаты коридорами (по центрам)
      for (let i = 1; i < rooms.length; i++) {
        const prev = rooms[i-1];
        const curr = rooms[i];
        const x1 = Math.floor(prev.x + prev.w/2);
        const y1 = Math.floor(prev.y + prev.h/2);
        const x2 = Math.floor(curr.x + curr.w/2);
        const y2 = Math.floor(curr.y + curr.h/2);
        if (Math.random() > 0.5) {
          createHorizontalTunnel(map, x1, x2, y1);
          createVerticalTunnel(map, y1, y2, x2);
        } else {
          createVerticalTunnel(map, y1, y2, x1);
          createHorizontalTunnel(map, x1, x2, y2);
        }
      }

      // Выбираем стартовую позицию в первой комнате
      const startRoom = rooms[0];
      const playerPos = {
        x: Math.floor(startRoom.x + startRoom.w/2),
        y: Math.floor(startRoom.y + startRoom.h/2)
      };

      // Выход в последней комнате
      const lastRoom = rooms[rooms.length - 1];
      const exitPos = {
        x: Math.floor(lastRoom.x + lastRoom.w/2),
        y: Math.floor(lastRoom.y + lastRoom.h/2)
      };

      // Размещаем врагов (не на игроке и выходе)
      const enemies = [];
      const enemyTypes = ['slime', 'skeleton'];
      for (let i = 0; i < enemyCount; i++) {
        const type = enemyTypes[randInt(0, enemyTypes.length - 1)];
        let pos;
        for (let attempt = 0; attempt < 50; attempt++) {
          const room = rooms[randInt(0, rooms.length - 1)];
          const ex = randInt(room.x + 1, room.x + room.w - 2);
          const ey = randInt(room.y + 1, room.y + room.h - 2);
          if (map[ey][ex] === 1 && !(ex === playerPos.x && ey === playerPos.y) && !(ex === exitPos.x && ey === exitPos.y) && !enemies.some(e => e.x === ex && e.y === ey)) {
            pos = { x: ex, y: ey };
            break;
          }
        }
        if (pos) {
          const stats = type === 'slime' ? { hp: 8, maxHp: 8, atk: 3, def: 0 } : { hp: 15, maxHp: 15, atk: 5, def: 1 };
          enemies.push({ ...pos, type, ...stats });
        }
      }

      // Размещаем предметы
      const items = [];
      const itemTypes = ['potion', 'sword'];
      for (let i = 0; i < itemCount; i++) {
        let pos;
        for (let attempt = 0; attempt < 30; attempt++) {
          const room = rooms[randInt(0, rooms.length - 1)];
          const ix = randInt(room.x + 1, room.x + room.w - 2);
          const iy = randInt(room.y + 1, room.y + room.h - 2);
          if (map[iy][ix] === 1 && !(ix === playerPos.x && iy === playerPos.y) && !(ix === exitPos.x && iy === exitPos.y) && !enemies.some(e => e.x === ix && e.y === iy) && !items.some(it => it.x === ix && it.y === iy)) {
            pos = { x: ix, y: iy };
            break;
          }
        }
        if (pos) {
          items.push({ ...pos, type: itemTypes[randInt(0, itemTypes.length - 1)] });
        }
      }

      return new Dungeon(map, rooms, playerPos, exitPos, enemies, items);
    }

    function intersect(r1, r2) {
      return !(r2.x >= r1.x + r1.w || r2.x + r2.w <= r1.x || r2.y >= r1.y + r1.h || r2.y + r2.h <= r1.y);
    }
    function createHorizontalTunnel(map, x1, x2, y) {
      for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
        if (y >= 0 && y < map.length && x >= 0 && x < map[0].length) map[y][x] = 1;
      }
    }
    function createVerticalTunnel(map, y1, y2, x) {
      for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
        if (y >= 0 && y < map.length && x >= 0 && x < map[0].length) map[y][x] = 1;
      }
    }
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // ================= ОТРИСОВКА =================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = MAP_COLS * TILE_SIZE;
    canvas.height = MAP_ROWS * TILE_SIZE;
    // Уменьшаем для маленьких экранов
    function resizeCanvas() {
      const maxWidth = window.innerWidth - 20;
      const maxHeight = window.innerHeight - 20;
      const scale = Math.min(maxWidth / (MAP_COLS * TILE_SIZE), maxHeight / (MAP_ROWS * TILE_SIZE));
      canvas.style.width = `${MAP_COLS * TILE_SIZE * scale}px`;
      canvas.style.height = `${MAP_ROWS * TILE_SIZE * scale}px`;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const spriteImg = new Image();
    spriteImg.src = SPRITE_SHEET;

    function drawGame() {
      if (!gameState || !gameState.dungeon) return;
      const d = gameState.dungeon;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Отрисовка карты
      for (let row = 0; row < d.map.length; row++) {
        for (let col = 0; col < d.map[row].length; col++) {
          const x = col * TILE_SIZE, y = row * TILE_SIZE;
          if (d.map[row][col] === 0) {
            ctx.fillStyle = COLORS.WALL;
            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          } else {
            ctx.fillStyle = COLORS.FLOOR;
            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          }
        }
      }

      // Предметы
      for (const item of d.items) {
        drawSprite(item.type === 'potion' ? SPRITE.POTION : SPRITE.SWORD, item.x, item.y);
      }

      // Выход
      drawSprite(SPRITE.EXIT, d.exitPos.x, d.exitPos.y);

      // Враги
      for (const enemy of d.enemies) {
        const spriteIdx = enemy.type === 'slime' ? SPRITE.ENEMY_SLIME : SPRITE.ENEMY_SKELETON;
        drawSprite(spriteIdx, enemy.x, enemy.y);
        // Полоска HP
        const hpRatio = enemy.hp / enemy.maxHp;
        if (hpRatio < 1) {
          ctx.fillStyle = '#ff0000';
          ctx.fillRect(enemy.x * TILE_SIZE, enemy.y * TILE_SIZE - 6, TILE_SIZE, 3);
          ctx.fillStyle = '#00ff00';
          ctx.fillRect(enemy.x * TILE_SIZE, enemy.y * TILE_SIZE - 6, TILE_SIZE * hpRatio, 3);
        }
      }

      // Игрок
      drawSprite(SPRITE.PLAYER, d.playerPos.x, d.playerPos.y);
    }

    function drawSprite(spriteIndex, tileX, tileY) {
      const sprSize = 16;
      ctx.drawImage(spriteImg,
        spriteIndex * sprSize, 0, sprSize, sprSize,
        tileX * TILE_SIZE, tileY * TILE_SIZE, TILE_SIZE, TILE_SIZE
      );
    }

    // ================= ИГРОВАЯ ЛОГИКА =================
    let gameState = null;
    let turnInProgress = false;

    function updateUI() {
      const p = gameState.player;
      document.getElementById('hp').textContent = p.hp;
      document.getElementById('maxhp').textContent = p.maxHp;
      document.getElementById('atk').textContent = p.atk;
      document.getElementById('def').textContent = p.def;
      document.getElementById('floor').textContent = gameState.floor;
      const invList = p.items.length ? p.items.join(', ') : 'пусто';
      document.getElementById('inv-list').textContent = invList;
    }

    function showLog(text, duration = 2000) {
      const logEl = document.getElementById('log');
      logEl.textContent = text;
      logEl.style.opacity = '1';
      clearTimeout(logEl._timeout);
      logEl._timeout = setTimeout(() => { logEl.style.opacity = '0'; }, duration);
    }

    function movePlayer(dx, dy) {
      if (!gameState || gameState.gameOver || turnInProgress) return;
      turnInProgress = true;
      initAudio();

      const d = gameState.dungeon;
      const newX = d.playerPos.x + dx;
      const newY = d.playerPos.y + dy;

      if (newX < 0 || newX >= MAP_COLS || newY < 0 || newY >= MAP_ROWS || d.map[newY][newX] === 0) {
        turnInProgress = false;
        return;
      }

      // Проверка врага
      const enemyIndex = d.enemies.findIndex(e => e.x === newX && e.y === newY);
      if (enemyIndex !== -1) {
        attackEnemy(enemyIndex, newX, newY);
        endTurn();
        return;
      }

      // Движение
      d.playerPos.x = newX;
      d.playerPos.y = newY;
      sfxStep();

      // Подбор предмета
      const itemIndex = d.items.findIndex(it => it.x === newX && it.y === newY);
      if (itemIndex !== -1) {
        const item = d.items[itemIndex];
        if (item.type === 'potion') {
          const heal = 10;
          gameState.player.hp = Math.min(gameState.player.hp + heal, gameState.player.maxHp);
          showLog(`Выпил зелье +${heal} HP`);
          sfxPickup();
        } else if (item.type === 'sword') {
          gameState.player.atk += 2;
          gameState.player.items.push('sword');
          showLog('Найдён меч! АТК +2');
          sfxPickup();
        }
        d.items.splice(itemIndex, 1);
      }

      // Проверка выхода
      if (newX === d.exitPos.x && newY === d.exitPos.y) {
        nextFloor();
        turnInProgress = false;
        return;
      }

      endTurn();
    }

    function attackEnemy(enemyIndex, atkX, atkY) {
      const enemy = gameState.dungeon.enemies[enemyIndex];
      const dmg = Math.max(1, gameState.player.atk - enemy.def);
      enemy.hp -= dmg;
      sfxHit();
      showLog(`Удар! ${dmg} урона врагу`);
      if (enemy.hp <= 0) {
        gameState.dungeon.enemies.splice(enemyIndex, 1);
        showLog('Враг повержен!');
        sfxLevelUp();
        // Случайный лут?
      }
      // Ответка (если враг жив)
      if (enemy && enemy.hp > 0) {
        const enemyDmg = Math.max(1, enemy.atk - gameState.player.def);
        gameState.player.hp -= enemyDmg;
        showLog(`Враг атакует! -${enemyDmg} HP`);
        if (gameState.player.hp <= 0) {
          gameState.player.hp = 0;
          gameState.gameOver = true;
          showLog('Вы погибли... Игра окончена');
        }
      }
    }

    function moveEnemies() {
      if (!gameState || gameState.gameOver) return;
      const d = gameState.dungeon;
      for (const enemy of d.enemies) {
        // Простой AI: двигаться к игроку, если рядом
        const dx = d.playerPos.x - enemy.x;
        const dy = d.playerPos.y - enemy.y;
        if (Math.abs(dx) <= 5 && Math.abs(dy) <= 5) {
          let moveX = 0, moveY = 0;
          if (Math.abs(dx) > Math.abs(dy)) {
            moveX = dx > 0 ? 1 : -1;
          } else {
            moveY = dy > 0 ? 1 : -1;
          }
          const newX = enemy.x + moveX, newY = enemy.y + moveY;
          // Если клетка свободна (пол и нет другого врага/игрока)
          if (d.map[newY] && d.map[newY][newX] === 1 &&
              !(newX === d.playerPos.x && newY === d.playerPos.y) &&
              !d.enemies.some(e => e !== enemy && e.x === newX && e.y === newY)) {
            enemy.x = newX;
            enemy.y = newY;
          }
          // Если оказался рядом с игроком – атака
          if (enemy.x === d.playerPos.x && enemy.y === d.playerPos.y) {
            const dmg = Math.max(1, enemy.atk - gameState.player.def);
            gameState.player.hp -= dmg;
            showLog(`Враг атакует в упор! -${dmg} HP`);
            if (gameState.player.hp <= 0) {
              gameState.player.hp = 0;
              gameState.gameOver = true;
              showLog('Вы погибли...');
            }
          }
        }
      }
    }

    function endTurn() {
      if (!gameState || gameState.gameOver) { turnInProgress = false; return; }
      moveEnemies();
      updateUI();
      drawGame();
      saveGame();
      turnInProgress = false;
    }

    function nextFloor() {
      gameState.floor++;
      gameState.dungeon = generateDungeon(gameState.floor);
      updateUI();
      drawGame();
      saveGame();
      showLog(`Спуск на этаж ${gameState.floor}!`);
    }

    // ================= СОХРАНЕНИЕ / ЗАГРУЗКА =================
    const SAVE_KEY = 'neural_dungeon_save';
    async function saveGame() {
      if (!gameState || gameState.gameOver) {
        // при смерти удаляем сохранение
        await storage.remove(SAVE_KEY);
        return;
      }
      const data = JSON.stringify(gameState.toJSON());
      await storage.set(SAVE_KEY, data);
    }

    async function loadGame() {
      const data = await storage.get(SAVE_KEY);
      if (data) {
        try {
          const parsed = JSON.parse(data);
          gameState = GameState.fromJSON(parsed);
          return true;
        } catch (e) { console.warn('Save corrupted'); }
      }
      return false;
    }

    async function startNewGame() {
      gameState = new GameState();
      gameState.dungeon = generateDungeon(1);
      gameState.gameOver = false;
      updateUI();
      drawGame();
      await saveGame();
      document.getElementById('menu').style.display = 'none';
    }

    // ================= УПРАВЛЕНИЕ =================
    function setupControls() {
      // Клавиатура (стрелки / WASD)
      window.addEventListener('keydown', (e) => {
        if (gameState?.gameOver) return;
        switch (e.key) {
          case 'ArrowUp': case 'w': case 'W': e.preventDefault(); movePlayer(0, -1); break;
          case 'ArrowDown': case 's': case 'S': e.preventDefault(); movePlayer(0, 1); break;
          case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); movePlayer(-1, 0); break;
          case 'ArrowRight': case 'd': case 'D': e.preventDefault(); movePlayer(1, 0); break;
        }
      });

      // Сенсорное управление (свайп)
      let touchStartX = 0, touchStartY = 0;
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: false });
      canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const absDx = Math.abs(dx), absDy = Math.abs(dy);
        if (Math.max(absDx, absDy) < 20) return; // слишком короткий свайп
        if (absDx > absDy) {
          movePlayer(dx > 0 ? 1 : -1, 0);
        } else {
          movePlayer(0, dy > 0 ? 1 : -1);
        }
      });
      canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    }

    // ================= ЗАПУСК ПРИЛОЖЕНИЯ =================
    async function init() {
      setupControls();
      // Ожидаем загрузку спрайта
      spriteImg.onload = async () => {
        const menuDiv = document.getElementById('menu');
        const menuButtons = document.getElementById('menu-buttons');
        const loaded = await loadGame();
        if (loaded && !gameState.gameOver) {
          menuButtons.innerHTML = `
            <button id="continueBtn">Продолжить (этаж ${gameState.floor})</button>
            <button id="newGameBtn">Новая игра</button>
          `;
        } else {
          menuButtons.innerHTML = `<button id="newGameBtn">Новая игра</button>`;
        }
        document.getElementById('newGameBtn')?.addEventListener('click', startNewGame);
        document.getElementById('continueBtn')?.addEventListener('click', () => {
          updateUI();
          drawGame();
          menuDiv.style.display = 'none';
        });
        // Автопродолжение если есть сейв? Нет, показываем меню.
        menuDiv.style.display = 'block';
      };
    }

    // Если спрайт уже загружен (data URI), запускаем сразу
    if (spriteImg.complete) {
      init();
    } else {
      spriteImg.onload = init;
    }
  </script>
</body>
</html>
