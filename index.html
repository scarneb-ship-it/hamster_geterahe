<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>TapVerse — кликер как VK Coin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="oblochka.jpg" alt="Загрузка..." id="splash-img">
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">TapVerse</h1>
                <button class="settings-button" id="settings-button" aria-label="Настройки">⚙️</button>
            </div>
        </header>

        <!-- Settings Panel -->
        <div class="settings-panel" id="settings-panel">
            <div class="settings-content">
                <h3 class="settings-title">Настройки</h3>
                <div class="setting-item">
                    <span class="setting-label">Тема</span>
                    <div class="theme-switcher">
                        <button class="theme-option active" data-theme="light">Светлая</button>
                        <button class="theme-option" data-theme="dark">Темная</button>
                    </div>
                </div>
                <button class="close-settings" id="close-settings">Готово</button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- TAP (Кликер) Секция -->
            <section id="tap-section" class="content-section active">
                <div class="tap-container">
                    <div class="balance-panel">
                        <div class="balance-title">BAUCHET</div>
                        <div class="balance-value" id="balance">0.000</div>
                        <div class="kurs-info">Курс: 1.00 ₽</div>
                    </div>

                    <div class="coin-wrapper" id="coin-wrapper">
                        <div class="coin" id="coin-tap">
                            <span class="coin-emoji">🪙</span>
                        </div>
                    </div>

                    <div class="stats-row">
                        <div class="stat-card">
                            <span class="stat-label">⚡ Сила клика</span>
                            <span class="stat-value" id="click-power">1.000</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">🤖 Авто-доход/сек</span>
                            <span class="stat-value" id="passive-income">0.000</span>
                        </div>
                    </div>

                    <div class="upgrades-section">
                        <h3 class="upgrades-title">🏪 Улучшения (как VK Coin)</h3>
                        <div class="upgrades-grid" id="upgrades-list"></div>
                    </div>

                    <button class="save-button" id="force-save-btn">💾 Сохранить прогресс</button>
                </div>
                <!-- Таблица лидеров (по балансу) -->
                <div class="leaderboard-container" id="tap-leaderboard">
                    <div class="leaderboard-header">
                        <h3 class="leaderboard-title">🏆 Топ кликеров</h3>
                        <button class="refresh-leaderboard" id="refresh-leaderboard-tap">🔄</button>
                    </div>
                    <div class="leaderboard-list" id="tap-leaderboard-list">
                        <div class="leaderboard-loading">Загрузка...</div>
                    </div>
                </div>
            </section>

            <!-- ЗАДАНИЯ: игры + биржи -->
            <section id="tasks-section" class="content-section">
                <div class="section-header">
                    <h2>Задания</h2>
                    <span class="section-subtitle">Игры и биржи для заработка</span>
                </div>

                <!-- Игры -->
                <div class="tasks-block">
                    <h3 class="tasks-block-title">🎮 Игры</h3>
                    <div class="games-grid" id="games-grid"></div>
                </div>

                <!-- Биржи -->
                <div class="tasks-block">
                    <h3 class="tasks-block-title">📊 Крипто-биржи</h3>
                    <div class="exchanges-list" id="exchanges-list"></div>
                </div>
            </section>

            <!-- Profile Section -->
            <section id="profile-section" class="content-section">
                <div class="profile-header">
                    <div class="profile-avatar" id="user-avatar">
                        <img src="" alt="User Avatar" id="avatar-img" style="display: none;">
                        <span id="avatar-fallback">T</span>
                    </div>
                    <div class="profile-info">
                        <h2 id="user-name">Пользователь</h2>
                        <p id="user-username">Открой в Telegram</p>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="share-friends-button" id="share-friends-button">
                        <div class="share-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M18 8C19.6569 8 21 6.65685 21 5C21 3.34315 19.6569 2 18 2C16.3431 2 15 3.34315 15 5C15 6.65685 16.3431 8 18 8Z" stroke="currentColor" stroke-width="2"/>
                                <path d="M6 15C7.65685 15 9 13.6569 9 12C9 10.3431 7.65685 9 6 9C4.34315 9 3 10.3431 3 12C3 13.6569 4.34315 15 6 15Z" stroke="currentColor" stroke-width="2"/>
                                <path d="M18 22C19.6569 22 21 20.6569 21 19C21 17.3431 19.6569 16 18 16C16.3431 16 15 17.3431 15 19C15 20.6569 16.3431 22 18 22Z" stroke="currentColor" stroke-width="2"/>
                                <path d="M8.59 13.51L15.42 17.49" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M15.41 6.51L8.59 10.49" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <span>Поделиться с друзьями</span>
                    </button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation (новый порядок) -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-section="tap-section">
                <span class="nav-icon">🪙</span>
                <span class="nav-label">Кликер</span>
            </button>
            <button class="nav-item" data-section="tasks-section">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Задания</span>
            </button>
            <button class="nav-item" data-section="profile-section">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Профиль</span>
            </button>
        </nav>

        <div id="notification" class="notification">Ссылка скопирована!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
